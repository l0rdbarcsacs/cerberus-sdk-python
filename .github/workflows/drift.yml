name: SDK ↔ API drift

on:
  schedule:
    # Monday 09:00 UTC (06:00 America/Santiago in winter, 05:00 in summer).
    # Runs weekly so new prod endpoints are flagged within 7 days.
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  drift:
    name: Check SDK ↔ prod OpenAPI coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e .
      - name: Check SDK ↔ API drift
        run: python scripts/check_sdk_drift.py --base-url https://compliance.cerberus.cl/v1 --fail-on-drift
      - name: Open issue on drift detection
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔀 SDK drift detected — ${today}`,
              body: [
                "The weekly drift cron detected differences between SDK resource coverage and prod OpenAPI.",
                "",
                `Workflow run: ${context.payload.repository.html_url}/actions/runs/${context.runId}`,
                "",
                "Action: rerun `python scripts/check_sdk_drift.py --base-url https://compliance.cerberus.cl/v1 --verbose` locally and either add new SDK wrappers for new API paths, or remove rotten SDK methods.",
              ].join("\n"),
              labels: ["drift", "auto-generated"],
            })
