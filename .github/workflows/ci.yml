name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests with coverage
        run: pytest -q
      - name: Upload coverage report (py3.12 only)
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v8
        with:
          name: coverage-report
          path: |
            .coverage
            coverage.xml
          if-no-files-found: ignore

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .

  typecheck:
    name: mypy --strict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: mypy --strict cerberus_compliance/

  integration:
    name: integration (live staging)
    runs-on: ubuntu-latest
    needs: [test, lint, typecheck]
    # Skip on forked-PRs (no access to secrets) — run on same-repo PRs and main pushes only.
    if: github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Smoke against staging
        env:
          CERBERUS_STAGING_KEY: ${{ secrets.CERBERUS_STAGING_KEY }}
        # --no-cov disables the 95% coverage gate from pyproject.toml addopts:
        # integration tests only exercise live-API paths (~64% cov); the gate
        # is enforced by the unit-test matrix above, not by this smoke job.
        run: pytest tests/integration/ -q --no-cov
